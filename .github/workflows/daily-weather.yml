name: 每日天气推送
on:
  schedule:
    # 每天08:00 CST (UTC+8) = 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  weather:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Query weather & push to Feishu
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
        run: python scripts/get_weather.py 上海
